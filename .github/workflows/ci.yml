name: ci
on: [push, pull_request]
jobs:
  # Fast, authoritative gate: types + unit/auth-security tests. No dev server,
  # so it can never hang and gives a green/red signal in ~2min. This is the
  # signal that must stay green (typecheck干净 / auth安全).
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Typecheck (all workspace packages)
        run: pnpm -F api-contract typecheck && pnpm -F core typecheck && pnpm -F @holon/auth typecheck && pnpm -F holon-mcp typecheck && pnpm -F web typecheck
      - name: Core unit tests
        run: pnpm -F core test
      - name: Auth unit tests
        run: pnpm -F @holon/auth test
      - name: Web auth-gate security tests
        # Locks the auth invariants: spoofed Host rejected, device-token enforced,
        # plugin shared-secret + loopback gate (lib/loopback-guard, device-token-auth).
        # Explicitly clear the demo escape hatch so the gate is asserted, never bypassed.
        env:
          HOLON_OPEN_DEMO: ''
        run: pnpm -F web test

  # E2E flow is heavier and can flake on the dev server; isolated so it never
  # holds the typecheck/auth signal hostage, and bounded so a non-starting dev
  # server fails fast (with logs) instead of hanging until the 6h job limit.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install JS deps
        run: pnpm install --frozen-lockfile
      - name: Install pandoc (make_pdf skill)
        run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: Install python-pptx (make_slides skill)
        run: pip install python-pptx
      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Start dev server (background)
        # `dev` lives in apps/web, not the root package.json — `pnpm dev` at root
        # fails with "Command dev not found" (the reason every run used to hang).
        run: nohup pnpm -F web dev > /tmp/holon-dev.log 2>&1 & disown
      - name: Wait for dev server (bounded — fail fast, not 6h hang)
        run: |
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000 || true)
            if [ "$code" = "200" ]; then echo "dev server up after $((i*2))s"; exit 0; fi
            sleep 2
          done
          echo "::error::dev server did not return 200 within 120s (last code=$code)"
          echo "----- dev server log -----"; cat /tmp/holon-dev.log || true
          exit 1
      - name: Daily-flow Playwright suite
        run: pnpm test:e2e:daily
