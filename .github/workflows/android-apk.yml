name: android-apk
# Build a sideload-ready Android APK for Holon mobile V1.
#
# Triggers:
#   - push to tags matching `v*-mobile` (e.g. v1.0.0-mobile)  → tagged release build
#   - workflow_dispatch                                       → manual any-branch build
#
# Output: artifact `holon-mobile-debug-<short-sha>.apk`
#   plus  `holon-mobile-release-<short-sha>.apk` IFF all four signing secrets are set:
#         ANDROID_KEYSTORE_BASE64
#         ANDROID_KEYSTORE_PASSWORD
#         ANDROID_KEY_ALIAS
#         ANDROID_KEY_PASSWORD
#   If any secret is missing the release step is skipped (debug APK is the V1 default).
#
# Local equivalent: scripts/build-android-apk.sh

on:
  push:
    tags:
      - 'v*-mobile'
  workflow_dispatch:
    inputs:
      build_release:
        description: 'Also build release-signed APK (requires signing secrets)'
        required: false
        default: 'false'

jobs:
  build:
    name: assembleDebug (+ optional assembleRelease)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Capacitor 6.x baseline is JDK 17 (later Capacitor 7+ moves to 21).
      # Match the lower baseline for max CI portability.
      JAVA_VERSION: '17'
      JAVA_DISTRIBUTION: 'zulu'
      NODE_VERSION: '22'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup JDK ${{ env.JAVA_VERSION }} (${{ env.JAVA_DISTRIBUTION }})
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build mobile static export (next build)
        working-directory: apps/mobile
        env:
          NEXT_PUBLIC_CAPACITOR: '1'
        run: pnpm exec next build

      - name: Capacitor sync android
        working-directory: apps/mobile
        run: npx cap sync android

      - name: Capacitor assets (icon + splash)
        working-directory: apps/mobile
        run: |
          if [ -f resources/icon.svg ]; then
            npx @capacitor/assets generate --android \
              --iconBackgroundColor "#F8F6EF" \
              --splashBackgroundColor "#F8F6EF"
          else
            echo "::notice::resources/icon.svg missing — using Capacitor default icon"
          fi

      - name: Gradle assembleDebug
        working-directory: apps/mobile/android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ./gradlew assembleDebug --no-daemon

      - name: Stage debug APK to dist/
        id: stage_debug
        run: |
          mkdir -p dist
          VERSION=$(grep -oP 'versionName "\K[^"]+' apps/mobile/android/app/build.gradle || echo 0.0.0)
          OUT="dist/holon-mobile-debug-${VERSION}-${{ steps.sha.outputs.short }}.apk"
          cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk "$OUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"
          echo "name=holon-mobile-debug-${VERSION}-${{ steps.sha.outputs.short }}" >> "$GITHUB_OUTPUT"
          ls -lh "$OUT"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage_debug.outputs.name }}
          path: ${{ steps.stage_debug.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      # ---------- Optional release-signed APK ----------
      - name: Check signing secrets
        id: signing
        env:
          KS:  ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KSP: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KA:  ${{ secrets.ANDROID_KEY_ALIAS }}
          KP:  ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KS" ] && [ -n "$KSP" ] && [ -n "$KA" ] && [ -n "$KP" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release signing secrets missing — skipping release APK build (V1 default)"
          fi

      - name: Decode keystore
        if: steps.signing.outputs.ready == 'true'
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p apps/mobile/android/app/keystore
          echo "$KS" | base64 -d > apps/mobile/android/app/keystore/release.jks

      - name: Gradle assembleRelease
        if: steps.signing.outputs.ready == 'true'
        working-directory: apps/mobile/android
        env:
          ANDROID_KEYSTORE_PATH: app/keystore/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:        ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:     ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Release signing config must be wired in app/build.gradle; this
          # workflow only provides the credentials. Skip gracefully if the
          # signing block isn't present yet (V1 ships debug only).
          if grep -q 'signingConfigs' app/build.gradle; then
            ./gradlew assembleRelease --no-daemon
          else
            echo "::warning::app/build.gradle has no signingConfigs block — release signing wiring is V1.1 work (TECH-DEBT). Skipping assembleRelease."
            exit 0
          fi

      - name: Stage release APK to dist/
        if: steps.signing.outputs.ready == 'true'
        id: stage_release
        run: |
          REL_APK=apps/mobile/android/app/build/outputs/apk/release/app-release.apk
          if [ -f "$REL_APK" ]; then
            VERSION=$(grep -oP 'versionName "\K[^"]+' apps/mobile/android/app/build.gradle || echo 0.0.0)
            OUT="dist/holon-mobile-release-${VERSION}-${{ steps.sha.outputs.short }}.apk"
            cp "$REL_APK" "$OUT"
            echo "path=$OUT" >> "$GITHUB_OUTPUT"
            echo "name=holon-mobile-release-${VERSION}-${{ steps.sha.outputs.short }}" >> "$GITHUB_OUTPUT"
            echo "uploaded=true" >> "$GITHUB_OUTPUT"
          else
            echo "uploaded=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload release APK artifact
        if: steps.signing.outputs.ready == 'true' && steps.stage_release.outputs.uploaded == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage_release.outputs.name }}
          path: ${{ steps.stage_release.outputs.path }}
          if-no-files-found: error
          retention-days: 90
