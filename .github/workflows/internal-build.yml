name: internal-build

# Internal-tester auto-build pipeline for desk (Windows .exe) + Android (.apk) + iOS (.ipa).
#
# Sibling of `daily-build.yml`:
#   - daily-build.yml   → builds `main`, ships to `nightly` rolling release
#                         (customer-facing; linked from chenz16/Holon marketing site)
#   - internal-build.yml (THIS FILE)
#                       → builds `dev`,  ships to `internal-nightly` rolling release
#                         (internal-tester-facing; NOT linked publicly)
#
# Owner direction (2026-05-30):
#   "以后内部测试使用 dev / 那个 release 的使用 main. 这样比较清晰."
#
# Triggers:
#   - cron: 12:00 UTC daily (6h offset from daily-build's 06:00 UTC so the
#           two pipelines never compete for runner minutes)
#   - workflow_dispatch (manual override)
#   - push to `dev` branch — every dev push builds an internal artifact
#
# Jobs (run in parallel; one job failing does NOT block the others):
#   1. windows-tauri  — Holon-Setup-internal.exe   (continue-on-error: Tauri is flaky)
#   2. linux-android  — Holon-Android-internal.apk (debug-signed, sideload-ready)
#   3. macos-ios      — Holon-iOS-internal.ipa     (DISABLED via `if: false`;
#                                                   same 4 Apple secrets as daily-build —
#                                                   see docs/ci/ios-daily-setup.md)

on:
  schedule:
    # 12:00 UTC = 20:00 CST = 08:00 EDT — 6h offset from daily-build.yml (06:00 UTC).
    - cron: '0 12 * * *'
  workflow_dispatch:
  push:
    branches: [dev]

permissions:
  contents: write    # required for gh release upload + tag push

env:
  INTERNAL_TAG: internal-nightly

jobs:
  # ---------------------------------------------------------------------------
  # Job 0 — ensure the `internal-nightly` rolling release exists, and bump its
  # tag to current dev so the release "code" matches what the artifacts were
  # built from. Subsequent jobs upload into this release with --clobber.
  # ---------------------------------------------------------------------------
  prepare-release:
    name: Prepare internal-nightly rolling release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Refresh internal-nightly tag → current dev
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git tag -f internal-nightly
          git push origin internal-nightly --force

      - name: Ensure internal-nightly release exists
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view internal-nightly --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release create internal-nightly \
              --repo "$GITHUB_REPOSITORY" \
              --prerelease \
              --title "Internal nightly build (dev branch)" \
              --notes "Internal-tester auto-build off the \`dev\` branch. Updated at 12:00 UTC daily + on every push to dev. Each run replaces the previous file via --clobber so this release stays disk-flat. NOT customer-facing — see \`nightly\` release for the main-branch customer build."
          else
            echo "internal-nightly release already exists — will be reused"
          fi

  # ---------------------------------------------------------------------------
  # Job 1 — Windows Tauri desk installer
  # Mirrors daily-build.yml's build steps (long-paths, isolated profile,
  # pnpm flatten for NSIS MAX_PATH). continue-on-error so Tauri flakes don't
  # block Android/iOS artifacts from shipping.
  # ---------------------------------------------------------------------------
  windows-tauri:
    name: Build Windows desk installer (Tauri NSIS)
    needs: prepare-release
    runs-on: windows-latest
    timeout-minutes: 60
    continue-on-error: true
    env:
      NODE_VERSION: '22.14.0'
    steps:
      - name: Enable Windows long paths (MAX_PATH > 260)
        shell: powershell
        run: |
          New-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.10.0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Rust (stable, MSVC host)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('apps/web/src-tauri/Cargo.lock', 'apps/web/src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache cargo build (src-tauri/target)
        uses: actions/cache@v4
        with:
          path: apps/web/src-tauri/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('apps/web/src-tauri/Cargo.lock', 'apps/web/src-tauri/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Install JS deps (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Fetch Node sidecar (x86_64-pc-windows-msvc)
        shell: bash
        env:
          NODE_VERSION: ${{ env.NODE_VERSION }}
        run: bash scripts/fetch-node-sidecar.sh x86_64-pc-windows-msvc

      - name: Prep clean profile dir for Next build
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/clean-profile/AppData/Roaming"
          mkdir -p "$RUNNER_TEMP/clean-profile/AppData/Local"

      - name: Build Next.js standalone
        env:
          USERPROFILE: ${{ runner.temp }}\clean-profile
          HOME: ${{ runner.temp }}/clean-profile
          APPDATA: ${{ runner.temp }}\clean-profile\AppData\Roaming
          LOCALAPPDATA: ${{ runner.temp }}\clean-profile\AppData\Local
        run: pnpm -F web build

      - name: Copy Next standalone into Tauri resources
        run: node scripts/copy-standalone-for-tauri.mjs

      - name: Flatten pnpm bundle for NSIS path limits
        shell: bash
        run: |
          set -e
          RES_NM="apps/web/src-tauri/resources/n/node_modules"
          PNPM_DIR="$RES_NM/.pnpm"
          if [ ! -d "$PNPM_DIR" ]; then
            echo "no .pnpm dir at $PNPM_DIR — skipping"
            exit 0
          fi
          for link in "$RES_NM"/*; do
            [ -L "$link" ] || continue
            real="$(readlink -f "$link")"
            [ -d "$real" ] || continue
            name="$(basename "$link")"
            echo "flattening: $name"
            rm "$link"
            cp -rL "$real" "$RES_NM/$name"
          done
          for scope in "$RES_NM"/@*; do
            [ -d "$scope" ] || continue
            for link in "$scope"/*; do
              [ -L "$link" ] || continue
              real="$(readlink -f "$link")"
              [ -d "$real" ] || continue
              name="$(basename "$link")"
              echo "flattening: $(basename "$scope")/$name"
              rm "$link"
              cp -rL "$real" "$scope/$name"
            done
          done
          rm -rf "$PNPM_DIR"

      - name: Tauri build (release)
        working-directory: apps/web
        run: pnpm tauri build --verbose

      - name: Stage installer artifacts
        shell: bash
        run: |
          set -euo pipefail
          STAGE="dist-windows"
          mkdir -p "$STAGE"
          BUNDLE_DIR="apps/web/src-tauri/target/release/bundle"
          if [ -d "$BUNDLE_DIR/nsis" ]; then
            cp "$BUNDLE_DIR/nsis"/*.exe "$STAGE"/ || true
          fi
          ls -la "$STAGE"
          if [ -z "$(ls -A "$STAGE")" ]; then
            echo "[internal-build:err:no_exe] bundle dir contained no .exe" >&2
            find "$BUNDLE_DIR" -type f | head -50 >&2 || true
            exit 1
          fi

      - name: Rename .exe to stable internal filename
        shell: bash
        run: |
          set -euo pipefail
          mv dist-windows/*.exe dist-windows/Holon-Setup-internal.exe

      - name: Upload .exe to internal-nightly release (clobber prior)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload internal-nightly dist-windows/Holon-Setup-internal.exe \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  # ---------------------------------------------------------------------------
  # Job 2 — Linux Android APK (debug-signed; sideload-ready)
  # ---------------------------------------------------------------------------
  linux-android:
    name: Build Android APK (debug-signed)
    needs: prepare-release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      JAVA_VERSION: '17'
      JAVA_DISTRIBUTION: 'zulu'
      NODE_VERSION: '22'
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Setup JDK ${{ env.JAVA_VERSION }} (${{ env.JAVA_DISTRIBUTION }})
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build APK via scripts/build-android-apk.sh
        env:
          JDK_PATH: ${{ env.JAVA_HOME }}
          ANDROID_SDK_PATH: ${{ env.ANDROID_SDK_ROOT }}
        run: bash scripts/build-android-apk.sh

      - name: Upload .apk to internal-nightly release (clobber prior)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          APK=$(ls dist/holon-mobile-*.apk | head -1)
          if [ -z "$APK" ]; then
            echo "[internal-build:err:no_apk] dist/ contained no .apk" >&2
            ls -la dist/ >&2 || true
            exit 1
          fi
          STABLE="dist/Holon-Android-internal.apk"
          cp "$APK" "$STABLE"
          gh release upload internal-nightly "$STABLE" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  # ---------------------------------------------------------------------------
  # Job 3 — macOS iOS IPA (SCAFFOLD ONLY — disabled)
  #
  # To enable: see docs/ci/ios-daily-setup.md (same 4 secrets work for BOTH
  # daily-build.yml and internal-build.yml — flip both `if: false` after the
  # secrets are wired).
  # ---------------------------------------------------------------------------
  macos-ios:
    name: Build iOS IPA (DISABLED — needs Apple secrets)
    needs: prepare-release
    if: false   # DISABLED — see docs/ci/ios-daily-setup.md to enable
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      NODE_VERSION: '22'
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v3

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build mobile static export (next build)
        working-directory: apps/mobile
        env:
          NEXT_PUBLIC_CAPACITOR: '1'
        run: pnpm exec next build

      - name: Capacitor sync ios
        working-directory: apps/mobile
        run: npx cap sync ios

      - name: Import signing certificate into temp keychain
        env:
          P12: ${{ secrets.APPLE_DEV_CERT_P12 }}
          PWD: ${{ secrets.APPLE_DEV_CERT_PWD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/dev-cert.p12"
          KEYCHAIN="$RUNNER_TEMP/holon-build.keychain-db"
          KP="holon-build-$RANDOM"
          echo "$P12" | base64 -d > "$CERT_PATH"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KP" "$KEYCHAIN"

      - name: Install provisioning profile
        env:
          PROFILE: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE" | base64 -d > "$PROFILE_DIR/holon-internal.mobileprovision"

      - name: xcodebuild archive + export IPA
        working-directory: apps/mobile/ios/App
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/ios-out"
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/ios-out/App.xcarchive" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive
          cat > "$RUNNER_TEMP/ios-out/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>development</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
          </dict>
          </plist>
          EOF
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/ios-out/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/ios-out/ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ios-out/ExportOptions.plist"

      - name: Stage IPA to dist/
        run: |
          set -euo pipefail
          mkdir -p dist
          IPA=$(ls "$RUNNER_TEMP/ios-out/ipa"/*.ipa | head -1)
          cp "$IPA" dist/Holon-iOS-internal.ipa

      - name: Upload .ipa to internal-nightly release (clobber prior)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release upload internal-nightly dist/Holon-iOS-internal.ipa \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
