                          oneOf:
                            - type: object
                              properties:
                                kind:
                                  type: string
                                  enum:
                                    - local_ai
                                agent_profile_id:
                                  type: string
                                  minLength: 1
                                tool_scope:
                                  type: array
                                  items:
                                    type: string
