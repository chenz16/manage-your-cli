                                    - max_tokens
                                    - max_cost_millicents
                                mentors:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      peer_id:
                                        type: string
                                        pattern: ^conn_[0-9A-Za-z]{20,30}$
                                      domain:
                                        type: string
                                        minLength: 1
                                      invocation_policy:
                                        type: string
                                        enum: *a3
                                      distillation_enabled:
                                        type: boolean
                                    required:
                                      - peer_id
                                      - domain
                                      - invocation_policy
                                      - distillation_enabled
                              required:
                                - kind
                                - agent_profile_id
                            - type: object
                              properties:
                                kind:
                                  type: string
                                  enum:
                                    - cli
                                binary:
                                  type: string
                                  minLength: 1
                                args_template:
                                  type: string
                                  minLength: 1
                                approval_rules:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      operation_pattern:
                                        type: string
                                        minLength: 1
                                      require_approval:
                                        type: boolean
                                    required:
                                      - operation_pattern
                                      - require_approval
                                  default: *a4
                              required:
                                - kind
                                - binary
                                - args_template
                            - type: object
                              properties:
                                kind:
                                  type: string
                                  enum:
                                    - peer
                                connection_id:
                                  type: string
                                  pattern: ^conn_[0-9A-Za-z]{20,30}$
                                remote_staff_name:
                                  type: string
                                  minLength: 1
                              required:
                                - kind
                                - connection_id
                                - remote_staff_name
                        autonomy_level:
                          type: string
                          enum: *a5
                        governance_mode:
                          type: string
                          enum: *a6
                        status:
                          type: string
                          enum: *a7
                        current_jobs:
                          type: integer
                          minimum: 0
                        max_concurrent_jobs:
                          type: integer
                          minimum: 0
                        cultivation_maturity:
                          type: integer
                          minimum: 0
                          maximum: 5
                        cultivation_profile:
                          type: object
                          properties:
                            cultivation_log:
                              type: array
                              items:
                                type: object
                                properties:
                                  kind:
                                    type: string
                                    enum:
                                      - mentor_consultation
                                  mentor_peer_id:
                                    type: string
                                    pattern: ^conn_[0-9A-Za-z]{20,30}$
                                  topic:
                                    type: string
                                  consulted_at:
                                    type: string
                                  summary:
                                    type: string
                                  outcome:
                                    type: string
                                    enum: *a8
                                required:
                                  - kind
                                  - mentor_peer_id
                                  - topic
                                  - consulted_at
                                  - summary
                                  - outcome
                              default: *a9
                      required:
                        - id
                        - desk_id
                        - name
                        - role_name
                        - role_label
                        - substrate
                        - autonomy_level
                        - governance_mode
                        - status
                        - current_jobs
                        - max_concurrent_jobs
                        - cultivation_maturity
                required:
                  - items
