                      - ts
                      - body
                required:
                  - message
  /api/v1/handoffs:
    post:
      summary: Dispatch a new handoff to a peer connection (form-aware body).
      tags:
        - composer
        - actions
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  properties:
                    recipient_connection_id:
                      type: string
                      pattern: ^conn_[0-9A-Za-z]{20,30}$
                    context_pack_id:
                      type: string
                    form:
                      type: string
                      enum:
                        - direct_order
                    instruction:
                      type: string
                      minLength: 1
                  required:
                    - recipient_connection_id
                    - form
                    - instruction
                - type: object
                  properties:
                    recipient_connection_id:
                      type: string
                      pattern: ^conn_[0-9A-Za-z]{20,30}$
                    context_pack_id:
                      type: string
                    form:
                      type: string
                      enum:
                        - direct_takeover
                    goal:
                      type: string
                      minLength: 1
                  required:
                    - recipient_connection_id
                    - form
                    - goal
                - type: object
                  properties:
                    recipient_connection_id:
                      type: string
                      pattern: ^conn_[0-9A-Za-z]{20,30}$
                    context_pack_id:
                      type: string
                    form:
                      type: string
                      enum:
                        - approval_chain
                    stages:
                      type: array
                      items:
                        type: object
                        properties:
                          stage_label:
                            type: string
                            minLength: 1
                          approver_desk:
                            type: string
                            minLength: 1
                          approval_form:
                            type: string
                            enum: *a11
                        required:
                          - stage_label
                          - approver_desk
                          - approval_form
                      minItems: 1
                  required:
                    - recipient_connection_id
                    - form
                    - stages
                - type: object
                  properties:
                    recipient_connection_id:
                      type: string
                      pattern: ^conn_[0-9A-Za-z]{20,30}$
                    context_pack_id:
                      type: string
                    form:
                      type: string
                      enum:
                        - watch_brief
                    watching:
                      type: string
                      minLength: 1
                    message:
                      type: string
                      minLength: 1
                  required:
                    - recipient_connection_id
                    - form
                    - watching
                    - message
      responses:
        "201":
          description: Handoff dispatched
          content:
            application/json:
              schema:
                type: object
                properties:
                  handoff_id:
                    type: string
                    pattern: ^handoff_[0-9A-Za-z]{20,30}$
                  preview_mission:
                    type: object
                    properties:
                      id:
                        type: string
                        pattern: ^mission_[0-9A-Za-z]{20,30}$
                      desk_id:
                        type: string
                        pattern: ^desk_[0-9A-Za-z]{20,30}$
                      inbound_handoff_id:
                        type: string
                        pattern: ^handoff_[0-9A-Za-z]{20,30}$
                      title:
                        type: string
                        minLength: 1
                      body:
                        type: string
                        minLength: 1
                      state:
                        type: string
                        enum: *a10
                      state_reason:
                        type: string
                      priority:
                        type: integer
                        minimum: 0
                        maximum: 100
                      sender_display_name:
                        type: string
                        minLength: 1
                      sender_connection_id:
                        type: string
                        pattern: ^conn_[0-9A-Za-z]{20,30}$
                      form:
                        type: string
                        enum: *a11
                      created_at:
                        type: string
                      accepted_at:
                        type: string
                      in_progress_at:
                        type: string
                      blocked_at:
                        type: string
                      submitted_at:
                        type: string
                      rejected_at:
                        type: string
                      expired_at:
                        type: string
                      returned_to_origin_at:
                        type: string
                      deadline_at:
                        type: string
                      assigned_staff_id:
                        type: string
                        pattern: ^staff_[0-9A-Za-z]{20,30}$
                    required:
                      - id
                      - desk_id
                      - inbound_handoff_id
                      - title
                      - body
                      - state
                      - priority
                      - sender_display_name
                      - sender_connection_id
                      - form
                      - created_at
                required:
                  - handoff_id
        "400":
          description: Form not accepted by recipient or invalid body
        "403":
          description: Sender authority insufficient for requested form
webhooks: {}
