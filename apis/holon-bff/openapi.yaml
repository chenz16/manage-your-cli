                                  - args
                              citations:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    label:
                                      type: string
                                  required:
                                    - id
                                    - label
                              streaming:
                                type: boolean
                            required:
