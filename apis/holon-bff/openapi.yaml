  /api/v1/deliverables/{id}:
    get:
      summary: Deliverable detail (full body + attribution).
      tags:
        - deliverables
      parameters:
        - schema:
            type: string
            pattern: ^deliv_[0-9A-Za-z]{20,30}$
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Deliverable detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  deliverable:
                    type: object
                    properties:
                      id:
                        type: string
                        pattern: ^deliv_[0-9A-Za-z]{20,30}$
                      desk_id:
                        type: string
                        pattern: ^desk_[0-9A-Za-z]{20,30}$
                      title:
                        type: string
                        minLength: 1
                      body_kind:
                        type: string
                        enum: *a14
                      body:
                        anyOf:
                          - type: object
                            properties:
                              markdown:
                                type: string
                            required:
                              - markdown
                          - type: object
                            additionalProperties: {}
                      origin_label:
                        type: string
                        enum: *a15
                      status:
                        type: string
                        enum: *a16
                      created_at:
                        type: string
                      source_assignment_id:
                        type:
                          - string
                          - "null"
                        pattern: ^assign_[0-9A-Za-z]{20,30}$
                      source_mission_id:
                        type:
                          - string
                          - "null"
                        pattern: ^mission_[0-9A-Za-z]{20,30}$
                      author_staff_id:
                        type:
                          - string
                          - "null"
                        pattern: ^staff_[0-9A-Za-z]{20,30}$
                      author_remote_desk_id:
                        type:
                          - string
                          - "null"
                        pattern: ^desk_[0-9A-Za-z]{20,30}$
                      submitted_to_connection_id:
                        type: string
                        pattern: ^conn_[0-9A-Za-z]{20,30}$
                    required:
                      - id
                      - desk_id
                      - title
                      - body_kind
                      - body
                      - origin_label
                      - status
                      - created_at
                required:
                  - deliverable
        "404":
          description: Unknown deliverable id
