  /api/v1/connections/{id}:
    get:
      summary: Connection detail (timeline + recent handoffs + policy + masked token).
      tags:
        - connections
      parameters:
        - schema:
            type: string
            pattern: ^conn_[0-9A-Za-z]{20,30}$
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Connection detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  connection:
                    type: object
                    properties:
                      id:
                        type: string
                        pattern: ^conn_[0-9A-Za-z]{20,30}$
                      desk_id:
                        type: string
                        pattern: ^desk_[0-9A-Za-z]{20,30}$
                      remote_person_id:
                        type: string
                        pattern: ^person_[0-9A-Za-z]{20,30}$
                      display_name:
                        type: string
                        minLength: 1
                      health_state:
                        type: string
                        enum: *a12
                      last_successful_at:
                        type: string
                      paired_at:
                        type: string
                      remote_desk_capabilities:
                        type: array
                        items:
                          type: string
                        default: *a13
                      last_failure_at:
                        type: string
                      last_failure_reason:
                        type: string
                      revoked_at:
                        type: string
                      revoked_reason:
                        type: string
                    required:
                      - id
                      - desk_id
                      - remote_person_id
                      - display_name
                      - health_state
                      - last_successful_at
                      - paired_at
                  health_timeline:
                    type: array
                    items:
                      type: object
                      properties:
                        ts:
                          type: string
                        state:
                          anyOf:
                            - type: string
                              enum: *a12
                            - type: string
                              enum:
                                - paired
                        reason:
                          type: string
                      required:
                        - ts
                        - state
                    maxItems: 20
                  recent_handoffs:
                    type: array
                    items:
                      anyOf:
                        - type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - mission
                            mission:
                              type: object
                              properties:
                                id:
                                  type: string
                                  pattern: ^mission_[0-9A-Za-z]{20,30}$
                                desk_id:
                                  type: string
                                  pattern: ^desk_[0-9A-Za-z]{20,30}$
                                inbound_handoff_id:
                                  type: string
                                  pattern: ^handoff_[0-9A-Za-z]{20,30}$
                                title:
                                  type: string
                                  minLength: 1
                                body:
                                  type: string
                                  minLength: 1
                                state:
                                  type: string
                                  enum: *a10
                                state_reason:
                                  type: string
                                priority:
                                  type: integer
                                  minimum: 0
                                  maximum: 100
                                sender_display_name:
                                  type: string
                                  minLength: 1
                                sender_connection_id:
                                  type: string
                                  pattern: ^conn_[0-9A-Za-z]{20,30}$
                                form:
                                  type: string
                                  enum: *a11
                                created_at:
                                  type: string
                                accepted_at:
                                  type: string
                                in_progress_at:
                                  type: string
                                blocked_at:
                                  type: string
                                submitted_at:
                                  type: string
                                rejected_at:
                                  type: string
                                expired_at:
                                  type: string
                                returned_to_origin_at:
                                  type: string
                                deadline_at:
                                  type: string
                                assigned_staff_id:
                                  type: string
                                  pattern: ^staff_[0-9A-Za-z]{20,30}$
                              required:
                                - id
                                - desk_id
                                - inbound_handoff_id
                                - title
                                - body
                                - state
                                - priority
                                - sender_display_name
                                - sender_connection_id
                                - form
                                - created_at
                          required:
                            - type
                            - mission
                        - type: object
                          properties:
                            type:
                              type: string
                              enum:
                                - deliverable
                            deliverable:
                              type: object
                              properties:
                                id:
                                  type: string
                                  pattern: ^deliv_[0-9A-Za-z]{20,30}$
                                desk_id:
                                  type: string
                                  pattern: ^desk_[0-9A-Za-z]{20,30}$
                                title:
                                  type: string
                                  minLength: 1
                                body_kind:
                                  type: string
                                  enum: *a14
                                body:
                                  anyOf:
                                    - type: object
                                      properties:
                                        markdown:
                                          type: string
                                      required:
                                        - markdown
                                    - type: object
                                      additionalProperties: {}
                                origin_label:
                                  type: string
                                  enum: *a15
                                status:
                                  type: string
                                  enum: *a16
                                created_at:
                                  type: string
                                source_assignment_id:
                                  type:
                                    - string
                                    - "null"
                                  pattern: ^assign_[0-9A-Za-z]{20,30}$
                                source_mission_id:
                                  type:
                                    - string
                                    - "null"
                                  pattern: ^mission_[0-9A-Za-z]{20,30}$
                                author_staff_id:
                                  type:
                                    - string
                                    - "null"
                                  pattern: ^staff_[0-9A-Za-z]{20,30}$
                                author_remote_desk_id:
                                  type:
                                    - string
                                    - "null"
                                  pattern: ^desk_[0-9A-Za-z]{20,30}$
                                submitted_to_connection_id:
                                  type: string
                                  pattern: ^conn_[0-9A-Za-z]{20,30}$
                              required:
                                - id
                                - desk_id
                                - title
                                - body_kind
                                - body
                                - origin_label
                                - status
                                - created_at
                          required:
                            - type
                            - deliverable
                    maxItems: 20
                  policy:
                    type: object
                    properties:
                      accepted_forms:
                        type: array
                        items:
                          type: string
                          enum: *a11
                      rate_limit_per_day:
                        type: integer
                        minimum: 0
                      auto_accept:
                        type: boolean
                    required:
                      - accepted_forms
                      - rate_limit_per_day
                      - auto_accept
                  token_info:
                    type: object
                    properties:
                      last_rotated_at:
                        type: string
                      expires_at:
                        type: string
                      fingerprint:
                        type: string
                      masked:
                        type: string
                        enum:
                          - ••••••••••••••••••••
                    required:
                      - fingerprint
                      - masked
                required:
                  - connection
                  - health_timeline
                  - recent_handoffs
                  - policy
                  - token_info
        "404":
          description: Unknown connection id
