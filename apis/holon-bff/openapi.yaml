                          type: string
                          pattern: ^desk_[0-9A-Za-z]{20,30}$
                        remote_person_id:
                          type: string
                          pattern: ^person_[0-9A-Za-z]{20,30}$
                        display_name:
                          type: string
                          minLength: 1
                        health_state:
                          type: string
                          enum: *a12
                        last_successful_at:
                          type: string
                        paired_at:
                          type: string
