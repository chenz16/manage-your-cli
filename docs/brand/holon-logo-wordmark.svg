<svg viewBox="0 0 960 320" xmlns="http://www.w3.org/2000/svg">
  <title>Holon — Wordmark Header (Open Mirror)</title>
  <desc>Header lockup: open-mirror two-C mark (gold C's facing outward, dark ink spine) plus Holon wordmark and tagline. Canonical wordmark for README / landing page.</desc>
  <rect width="960" height="320" fill="#F8F6EF"/>
  <!-- Mark: open-mirror C's, scaled to fit 240x240 box on the left (translate 40 40, inner mark centered at 120,120) -->
  <g transform="translate(40 40)">
    <g fill="none" stroke="#C69A35" stroke-width="26" stroke-linecap="round">
      <!-- Left C opens left -->
      <path d="M 102 44 A 78 78 0 1 1 102 196"/>
      <!-- Right C opens right (mirror) -->
      <path d="M 138 44 A 78 78 0 1 0 138 196"/>
    </g>
    <!-- Thin ink spine indicates joined backs -->
    <line x1="120" y1="70" x2="120" y2="170" stroke="#1A1A18" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="320" y="172" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="720" font-size="108" fill="#1A1A18" letter-spacing="-2">Holon</text>
  <!-- Tagline -->
  <text x="322" y="220" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="26" fill="#1A1A18" opacity="0.72">Local teams. Connected workforce.</text>
</svg>
